<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia MWC Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-6 flex flex-col">

    <div class="max-w-4xl w-full mx-auto space-y-6 mb-8">

        <header>
            <h1 class="text-3xl font-bold text-amber-500">Tibia Mini World Changes Analyzer</h1>
            <p class="text-gray-400 text-sm mt-1">Cole as linhas do seu Server Log abaixo para identificar os eventos ativos.</p>
        </header>

        <!-- ÁREA DE INPUT -->
        <div class="relative">
            <textarea id="serverLog" 
                oninput="atualizarContador()"
                maxlength="5001" 
                class="w-full h-44 p-4 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-amber-500 font-mono text-sm placeholder-gray-500" 
                placeholder="Ex: 16:50:47 Poachers have slaughtered..."></textarea>
            
            <div id="contador" class="absolute bottom-2 right-4 text-xs text-gray-500 font-mono">
                0 / 5000
            </div>
        </div>

        <button id="btnAnalisar" onclick="processarLog()" class="w-full md:w-auto px-6 py-3 bg-amber-600 hover:bg-amber-500 text-gray-900 font-bold rounded-lg transition shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
            🔍 Analisar Eventos Ativos
        </button>

        <!-- TABELA -->
        <div class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-750 border-b border-gray-700 text-amber-400 text-sm">
                        <th class="p-4 w-1/2">Mini World Change (Evento)</th>
                        <th class="p-4 w-1/2">Localização Ativa</th>
                    </tr>
                </thead>
                <tbody id="tabelaResultados" class="divide-y divide-gray-700 text-sm">
                    <tr><td colspan="2" class="p-4 text-center text-gray-500 italic">Nenhum dado processado ainda.</td></tr>
                </tbody>
            </table>
        </div>

        <!-- NOTÍCIAS -->
        <h2 class="text-xl font-bold text-amber-500 flex items-center gap-2">
            📰 Últimas Notícias do Tibia
        </h2>
        <div id="containerNoticias" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <p class="text-gray-500 italic">Carregando notícias...</p>
        </div>
    </div>

    <script>
        const mapeamentoEventos = {
            "The wild animals north of the Green Claw Swamp clearly dominate the area": "Poacher Caves (Bears/Boars/Wolves)",
            "Poachers are ravaging the wildlife north of the Green Claw Swamp": "Poacher Caves (Hunters/Poachers)",
            "Poachers have slaughtered nearly all wild animals north of the Green Claw Swamp. But vengeful spirits show up there now!": "Poacher Caves (Gloom/Ghost Wolves)",
            "Strange sounds echo through Trapwood as hunters and dworcs fight": "Dworc Camp / Hunter Camp",
            "A sandstorm travels through Darama, leading to isles full of deadly creatures": "Nightmare Isles",
            "Stampede! The Ape God has stirred up Tiquanda's elephants": "Stampede",
            "Nomads travel the eternal sands of Ankrahmun's desert": "Nomads",
            "Looks like the Queen's own royal trees are being cut down": "Lumberjack",
            "Bibby Bloodbath and her crew are roaming the lands": "Bibby Bloodbath",
            "Adventurers have told of a Spirit Gate": "Spirit Gate"
        };

        const locaisFixos = {
            "Poacher Caves (Bears/Boars/Wolves)": "Orc Land (Cave Norte - Animais)",
            "Poacher Caves (Hunters/Poachers)": "Orc Land (Cave Norte - Caçadores)",
            "Poacher Caves (Gloom/Ghost Wolves)": "Orc Land (Cave Norte - Espíritos)",
            "Dworc Camp / Hunter Camp": "Tiquanda (Trapwood)",
            "Nightmare Isles": "Darama (Costa)",
            "Stampede": "Tiquanda (Elephants)",
            "Nomads": "Ankrahmun (Deserto)",
            "Lumberjack": "Carlin (Norte)",
            "Bibby Bloodbath": "Zao (Mazzinor)",
            "Spirit Gate": "Chyllfroest"
        };

        function atualizarContador() {
            const textarea = document.getElementById("serverLog");
            const contador = document.getElementById("contador");
            const btn = document.getElementById("btnAnalisar");
            const length = textarea.value.length;
            contador.innerText = `${length} / 5000`;
            btn.disabled = length > 5000;
        }

        function processarLog() {
            const logTexto = document.getElementById("serverLog").value.replace(/[<>]/g, '');
            const tabelaBody = document.getElementById("tabelaResultados");
            tabelaBody.innerHTML = "";
            let encontrouAlgum = false;

            for (const [mensagemChave, nomeEvento] of Object.entries(mapeamentoEventos)) {
                if (logTexto.includes(mensagemChave)) {
                    tabelaBody.innerHTML += `<tr class="border-b border-gray-700">
                        <td class="p-4 font-semibold text-amber-400">${nomeEvento}</td>
                        <td class="p-4 text-gray-300">${locaisFixos[nomeEvento] || "Global"}</td>
                    </tr>`;
                    encontrouAlgum = true;
                }
            }
            if(!encontrouAlgum) tabelaBody.innerHTML = `<tr><td colspan="2" class="p-4 text-center text-red-400 italic">Nenhum evento detectado.</td></tr>`;
        }

        async function carregarNoticias() {
            const container = document.getElementById("containerNoticias");
            try {
                const response = await fetch("https://api.tibiadata.com/v4/news/latest");
                const data = await response.json();
                container.innerHTML = "";
                data.news.slice(0, 3).forEach(item => {
                    const [y, m, d] = item.date.split('-');
                    // Transformei a div em um link (<a>) para tornar toda a área clicável
                    container.innerHTML += `
                        <a href="${item.url}" target="_blank" class="bg-gray-800 p-4 rounded-lg border border-gray-700 hover:border-amber-600 transition flex flex-col cursor-pointer">
                            <span class="text-xs text-gray-500 block mb-1">${d}/${m}/${y}</span>
                            <h3 class="text-amber-100 font-bold text-sm mb-3">${item.news}</h3>
                            <span class="inline-block bg-amber-900/40 text-amber-500 text-[10px] uppercase font-bold px-2 py-0.5 rounded mt-auto w-fit">${item.category}</span>
                        </a>`;
                });
            } catch (e) { container.innerHTML = `<p class="text-red-400">Erro ao carregar notícias.</p>`; }
        }
        
        carregarNoticias();
    </script>
</body>
</html>
